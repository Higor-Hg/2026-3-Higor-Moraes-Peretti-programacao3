<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revenda Hot Wheels</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="#principal">Principal</a>
        <a href="#promoção">Promoção</a>
        <a href="#produtos">Produtos</a>
        <a href="#contato">Contato</a>
    </nav>
    
    <div id="principal"><h1>Revenda Hot Wheels</h1>
        <p class="headline"> compre agora sus fabulosos HOT WHEELS</p>
        <img src="Imagens/ImagenWheelsPrincipal.avif" alt="Capa do lendingpage">
    </div>
    <div id="promoção"><h2>Promoção</h2></div>
    <div id="produtos"><h2>Produtos</h2></div>
    <div id="contato">
        <h2>Contato</h2>
        <form action="#" method="get">
            <label for="fnome">Nome:</label><br>
            <input type="text" id="fnome"name="fnome"
            placeholder="Informe seu Nome" autofocus><br>
            <label for="femail">Email:</label><br>
            <input type="text" id="femail"name="femail"
            placeholder="Informe seu Email" required><br>
            <label for="fnome">Senha:</label><br>
            <input type="password" id="fsenha"name="fsenha"
            placeholder="*********" ><br>
            <label for="festado">Estado:</label><br>
            <select  id="festado"name="festado">
                <option value="pr">PR</option>
                <option value="sc">SC</option>
                <option value="rs">RS</option>
            </select><br>
            <label for="fmsg">Mensagem:</label>
            <textarea name="fmsg" rows="5" cols="30"
            placeholder="Informe sua Mensagem"></textarea><br>
            <input type="submit" value="enviar">

        </form>
    </div>
</body>
<footer><p>&copy2026 Todos os Respeitos Reservados para o IF</p></footer>
</html>
