<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zog Pizzaria</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div class="top-bar">
        <form action="/buscar" method="get" class="search-form">
            <input type="search" name="q" placeholder="Pesquisar..." aria-label="Campo de pesquisa">
            <button type="submit">Buscar</button>
        </form>

        <div class="user-actions">
            <a href="/login" class="btn-link">Entrar</a>
            <span>|</span>
            <a href="/cadastro" class="btn-link">Cadastrar</a>
        </div>
    </div>
   <header>
    <div class="header-container">
        <!-- Logo -->
        <div class="logo-area">
            <p class="logo">Bem vindo ao Mundo Do Sabor</p>
            <img src="Logo/Logo.jpg" alt="Logo Zog Pizza">
        </div>

        <!-- Barra Lateral -->
        <nav class="sidebar">
            <h2>Menu</h2>
            <ul> 
                <li><a href="#">Produtos</a></li>
                <li><a href="#">Carrinho</a></li>
                <li><a href="#">Cupons</a></li>
            </ul>
        </nav>
    </div>
</header>

    <div class="wrapper">
        
        <!--Resto do site-->
       <main class="content">
        <h1>Promoções</h1>

        <div class="produtos">

            <div class="card">
                <img src="Pizzas/PizzaCalabresaCatupiry.jpg" alt="Pizza Calabresa">
                <h3>Pizza Calabresa</h3>
                <p class="preco">R$ 39,90</p>
            </div>

            <div class="card">
                <img src="Pizzas/PizzaFrango.jpg" alt="Pizza Frango">
                <h3>Pizza Frango com Catupiry</h3>
                <p class="preco">R$ 42,90</p>
            </div>

            <div class="card">
                <img src="Pizzas/PizzaPortuguesa.jpg" alt="Pizza Portuguesa">
                <h3>Pizza Portuguesa</h3>
                <p class="preco">R$ 44,90</p>
            </div>

            <div class="card">
                <img src="Pizzas/PizzaChocolate.jpg" alt="Pizza Chocolate">
                <h3>Pizza Chocolate</h3>
                <p class="preco">R$ 35,90</p>
            </div>

    </div>
</main>
    </div>   
        
</body>
</html>
